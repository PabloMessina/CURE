# =========================
# Training Configuration
# =========================

# --- Run Info ---
run_name: "padchestgr_reportgen_cxrmate_rrg24_overfit_entire_dataset_v3"

# --- Model Configuration ---
model:
  name: "aehrc/cxrmate-rrg24"
  model_name_or_path: "aehrc/cxrmate-rrg24" # Intended to be a Hugging Face model name or path
  freeze_config: # Freezing configuration for the model
    freeze_all: true
    unfreeze_patterns: # List of patterns to unfreeze
      - '^encoder\.'
      - '^decoder\.lm_head\.'

# --- Tokenization Configuration ---
train_tokenization_config:
  max_length: 512

# --- Optimizer Configuration ---
optimizer:
  type: "AdamW"
  lr: 1.0e-6
  kwargs:
    weight_decay: 0.01
    # Add more optimizer kwargs as needed

# --- LR Scheduler Configuration ---
lr_scheduler:
  type: "ExponentialCyclicLR"
  step_mode: "batch"  # or "epoch" if you want to step every epoch
  kwargs:
    max_lr: 4.0e-6
    step_size_up: 200
    step_size_down: 200

# --- Training Settings ---
training:
  num_epochs: 20
  batches_per_epoch: 500
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  device_type: "cuda"  # or "mps" or "cpu"
  use_mixed_precision: true
  loss_computation_strategy: "aehrc/cxrmate-rrg24" # or "default"
  log_interval_steps: 50 # Log every 50 steps

# --- Training Dataset Configuration ---
train_dataset_config:
  name: "padchest-gr"
  batch_size: 32
  num_workers: 3
  constructor_kwargs:
    split: "all" # Use "all" for training on the entire dataset
    grounded: false
    language: "en"
    image_format: "jpg"
    return_image_path: false
    image_transforms_kwargs:
      use_model_specific_transforms: false
      image_size: 384 # Image size used by cxrmate-rrg24's UniFormer backbone
      # See https://huggingface.co/aehrc/cxrmate-rrg24/blob/main/config.json
      image_mean: [0.485, 0.456, 0.406]
      image_std: [0.229, 0.224, 0.225]
      is_train: true # This enables data augmentation for training

# --- Validation Dataset Configuration ---
val_dataset_config:
  name: "padchest-gr"
  batch_size: 32
  num_workers: 3
  constructor_kwargs:
    split: "validation"
    grounded: false
    language: "en"
    image_format: "jpg"
    return_image_path: false
    image_transforms_kwargs:
      use_model_specific_transforms: false
      image_size: 384
      image_mean: [0.485, 0.456, 0.406]
      image_std: [0.229, 0.224, 0.225]
      is_train: false

# --- Evaluation Configuration ---
evaluation:
  metrics:
    - CheXbert
    - BERTScore
  
  checkpoint_metric_weights:
    CheXbert_macro_f1: 1.0
    CheXbert_micro_f1: 1.0
    CheXbert_accuracy: 1.0
    BERTScore_F1: 1.5

  decoding:
    num_beams: 4
    max_length: 512

# --- Tracking (Weights & Biases) ---
tracking:
  wandb:
    enabled: true
    project: "biomed-vlm-reportgen"
    run_name: "padchestgr_reportgen_cxrmate_rrg24_overfit_entire_dataset_v3"
    tags: ["dataset:padchest-gr", "model:cxrmate-rrg24", "task:report-generation"]
    notes: "This is a test run for the cxrmate-rrg24 model on the PadChest-GR dataset. We want to see if the model can overfit on the entire dataset."
    epochwise_metrics: # x-axis: epoch
      - "train/avg_loss"
      - "val/CheXbert_macro_f1"
      - "val/CheXbert_micro_f1"
      - "val/CheXbert_accuracy"
      - "val/BERTScore_F1"
      - "val/BERTScore_P"
      - "val/BERTScore_R"
    stepwise_metrics: # x-axis: step
      - "train/batch_loss"
      - "train/learning_rate"
      - "train/steps_per_sec"

