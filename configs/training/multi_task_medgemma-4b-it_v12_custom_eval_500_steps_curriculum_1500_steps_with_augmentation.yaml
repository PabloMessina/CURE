run_name: multi_task_medgemma-4b-it_v12_custom_eval_500_steps_curriculum_1500_steps_with_augmentation

model:
  base_model_id: "google/medgemma-4b-it"
  use_flash_attention: true

training:
  # --- Core Training Parameters ---
  learning_rate: 2.0e-5
  per_device_train_batch_size: 5
  per_device_eval_batch_size: 8 # Also used by the custom eval callback
  gradient_accumulation_steps: 5
  optim: "adamw_torch_fused"
  bf16: true

  # --- Duration Control ---
  num_train_epochs: 1
  max_steps: 6000

  # --- Evaluation and Saving Strategy ---
  eval_strategy: "steps"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 1
  load_best_model_at_end: false

  # --- Evaluation Mode Control ---
  # This block is the master switch for the new evaluation logic.
  evaluation:
    mode: "custom" # Set to "custom" to activate GranularEvaluationCallback. "default" for old behavior.
    
    # --- Settings for "custom" mode ---
    save_predictions_to_file: true
    save_predictions_to_file_name: "predictions_custom_eval.jsonl"    
    custom_eval_samples_per_dataset: 100 # Number of samples to draw from each validation set.
    custom_eval_max_new_tokens: 150 # Max tokens for model.generate() in the callback.    
    # Name for the aggregate metric that the custom callback will compute.
    # This is what TopKCheckpointCallback will track.
    custom_metric_for_best_model: "eval_overall_iou_cxrfescore"
    custom_greater_is_better: true
    # Weights for the aggregate metric.
    metric_weights:
      bbox_iou: 0.75
      cxrfescore: 0.25

    skip_curriculum_reweighting: false
    curriculum_reweighting_every_n_steps: 1500 # Reweight the datasets every 1500 steps.

  # --- Logging and Reporting ---
  logging_steps: 5
  report_to: "wandb"

  # --- Resuming from a checkpoint ---
  resume_from_checkpoint_path: null

  # In your train_config.yaml
  diagnostics:
    enabled: false # Set to true to activate logging
    # enabled: true # Set to true to activate logging
    # log_every_n_batches: 25 # How often to gather and save the diagnostics (5 steps = 25 batches due to gradient accumulation)
    # output_filename: "training_sampling_diagnostics.jsonl"
  
datasets:
  train:
    - name: "chest-imagenome"
      weight: 1.0
      args:
        split: "train"
        prompt_modes: ["locate_and_describe", "describe", "locate"]
        prompt_mode_weights:
          locate_and_describe: 1.0
          describe: 1.0
          locate: 1.0
        bbox_format: "cxcywh"
        image_transforms_kwargs:
          use_model_specific_transforms: true
          model_name: "pil_with_augmentations"
          bbox_format: "cxcywh"
          image_size: [448, 448]
          is_train: true # With augmentations for training
          augmenter_override_params:
            apply_clahe: true
            apply_spatial_train: true
            apply_color_train: false
            p_test_in_train: 0.30 # 30% of train images use test pipeline
        use_weighted_sampling: true

    - name: "padchest-gr"
      task: "grounded-report-generation"
      weight: 1.0
      args:
        split: "train"
        grounded: true
        bbox_format: "cxcywh"
        image_transforms_kwargs:
          use_model_specific_transforms: true
          model_name: "pil_with_augmentations"
          bbox_format: "cxcywh"
          image_size: [448, 448]
          is_train: true # With augmentations for training
          augmenter_override_params:
            apply_clahe: true
            apply_spatial_train: true
            apply_color_train: false
            p_test_in_train: 0.30 # 30% of train images use test pipeline

    - name: "padchest-gr"
      task: "phrase-grounding"
      weight: 1.0
      args:
        split: "train"
        gt_bbox_format: "cxcywh"
        include_labels_as_phrases: true
        image_transforms_kwargs:
          use_model_specific_transforms: true
          model_name: "pil_with_augmentations"
          bbox_format: "cxcywh"
          image_size: [448, 448]
          is_train: true # With augmentations for training
          augmenter_override_params:
            apply_clahe: true
            apply_spatial_train: true
            apply_color_train: false
            p_test_in_train: 0.30 # 30% of train images use test pipeline
        use_weighted_sampling: true
        
    - name: "ms-cxr"
      task: "phrase-grounding"
      weight: 1.0
      args:
        split: "train"
        gt_bbox_format: "cxcywh"
        image_transforms_kwargs:
          use_model_specific_transforms: true
          model_name: "pil_with_augmentations"
          bbox_format: "cxcywh"
          image_size: [448, 448]
          is_train: true # With augmentations for training
          augmenter_override_params:
            apply_clahe: true
            apply_spatial_train: true
            apply_color_train: false
            p_test_in_train: 0.30 # 30% of train images use test pipeline
        use_weighted_sampling: true
        
  val:
    - name: "chest-imagenome"
      eval_samples: 100
      max_new_tokens: 200 # Allow longer descriptions
      args:
        split: "val"
        prompt_modes: ["locate_and_describe", "describe", "locate"]
        bbox_format: "cxcywh"
        return_image_path: true
        image_transforms_kwargs:
          use_model_specific_transforms: true
          model_name: "pil_with_augmentations" 
          bbox_format: "cxcywh"
          image_size: [448, 448]
          is_train: false # No augmentations for validation

    - name: "padchest-gr"
      task: "grounded-report-generation"
      eval_samples: 80
      max_new_tokens: 200 # Allow longer descriptions
      args:
        split: "validation"
        grounded: true
        bbox_format: "cxcywh"
        return_image_path: true
        image_transforms_kwargs:
          use_model_specific_transforms: true
          model_name: "pil_with_augmentations" 
          bbox_format: "cxcywh"
          image_size: [448, 448]
          is_train: false # No augmentations for validation

    - name: "padchest-gr"
      task: "phrase-grounding"
      eval_samples: 100
      max_new_tokens: 150
      args:
        split: "validation"
        gt_bbox_format: "cxcywh"
        include_labels_as_phrases: true
        return_image_path: true
        image_transforms_kwargs:
          use_model_specific_transforms: true
          model_name: "pil_with_augmentations" 
          bbox_format: "cxcywh"
          image_size: [448, 448]
          is_train: false # No augmentations for validation

    - name: "ms-cxr"
      task: "phrase-grounding"
      eval_samples: 64
      max_new_tokens: 150
      args:
        split: "val"
        gt_bbox_format: "cxcywh"
        return_image_path: true
        image_transforms_kwargs:
          use_model_specific_transforms: true
          model_name: "pil_with_augmentations" 
          bbox_format: "cxcywh"
          image_size: [448, 448]
          is_train: false # No augmentations for validation

# --- Tracking (Weights & Biases) ---
tracking:
  wandb:
    enabled: true
    project: "multi-task-medgemma"
    run_name: "multi_task_medgemma-4b-it_v12_custom_eval_500_steps_curriculum_1500_steps_with_augmentation"
    tags: ["dataset:chest-imagenome", "dataset:padchest-gr", "dataset:ms-cxr",
           "model:medgemma-4b-it", "eval:custom", "curriculum:1500"]
    notes: "Testing custom granular evaluation callback every 500 steps and curriculum reweighting every 1500 steps with augmentations."