# =========================
# Training Configuration
# =========================

# --- Run Info ---
run_name: "chestimagenome_anatomy_reportgen_cxrmate_rrg24_end_to_end_finetuning"

# --- Model Configuration ---
model:
  name: "aehrc/cxrmate-rrg24"
  model_name_or_path: "aehrc/cxrmate-rrg24" # Intended to be a Hugging Face model path

# --- Tokenization Configuration ---
train_tokenization_config:
  strategy_name: "cxrmate_rrg24_prompt_guided_report"
  max_length: 512

# --- Optimizer Configuration ---
optimizer:
  type: "AdamW"
  lr: 1.0e-6
  kwargs:
    weight_decay: 0.01
    # Add more optimizer kwargs as needed

# --- LR Scheduler Configuration ---
lr_scheduler:
  type: "ExponentialCyclicLR"
  step_mode: "batch"  # or "epoch" if you want to step every epoch
  kwargs:
    max_lr: 8.0e-6
    step_size_up: 200
    step_size_down: 200

# --- Training Settings ---
training:
  num_epochs: 30
  batches_per_epoch: 300
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  device_type: "cuda"  # or "mps" or "cpu"
  use_mixed_precision: true
  loss_computation_strategy: "aehrc/cxrmate-rrg24" # or "default"
  log_interval_steps: 50 # Log every 50 steps

# --- Training Dataset Configuration ---
train_dataset_config:
  name: "chest-imagenome"
  batch_size: 32
  num_workers: 4
  constructor_kwargs:
    split: "train"
    bbox_format: "cxcywh"
    prompt_modes: 
      - "describe"
      - "localize"
      - "localize_and_describe"
    prompt_mode_weights: 
      "describe": 1.0
      "localize": 1.0
      "localize_and_describe": 1.0
    return_image_path: false
    image_transforms_kwargs:
      use_model_specific_transforms: false
      image_size: 384
      image_mean: [0.485, 0.456, 0.406]
      image_std: [0.229, 0.224, 0.225]
      is_train: true # Turn on data augmentation
      bbox_format: "cxcywh" # Handle augmentation of bounding boxes with this format

# --- Validation Dataset Configuration ---
val_dataset_config:
  name: "chest-imagenome"
  batch_size: 100
  num_workers: 4
  epoch_sample_size: 500 # Number of samples to evaluate per epoch (since the entire validation set may be too large)
  constructor_kwargs:
    split: "val"
    bbox_format: "cxcywh"
    prompt_modes: 
      - "describe"
    return_image_path: false
    image_transforms_kwargs:
      use_model_specific_transforms: false
      image_size: 384
      image_mean: [0.485, 0.456, 0.406]
      image_std: [0.229, 0.224, 0.225]
      is_train: false  # No data augmentation for validation

# --- Evaluation Configuration ---
evaluation:
  metrics:
    - CheXbert
    - BERTScore
  
  checkpoint_metric_weights:
    CheXbert_macro_f1: 1.0
    CheXbert_micro_f1: 1.0
    CheXbert_accuracy: 1.0
    CheXbert_cosine_similarity: 1.0
    BERTScore_F1: 2.0

  decoding:
    num_beams: 2
    max_new_tokens: 512

# --- Tracking (Weights & Biases) ---
tracking:
  wandb:
    enabled: true
    project: "biomed-vlm-reportgen"
    run_name: "chestimagenome_anatomy_reportgen_cxrmate_rrg24_end_to_end_finetuning"
    tags: ["dataset:chest-imagenome", "model:cxrmate-rrg24", "task:prompt-guided-report-generation"]
    notes: "This is a generalization finetuning run for the cxrmate-rrg24 model on the chestimagenome dataset, trained on anatomy-guided reports."
    epochwise_metrics: # x-axis: epoch
      - "train/avg_loss"
      - "val/CheXbert_macro_f1"
      - "val/CheXbert_micro_f1"
      - "val/CheXbert_accuracy"
      - "val/CheXbert_cosine_similarity"
      - "val/BERTScore_F1"
      - "val/BERTScore_P"
      - "val/BERTScore_R"
    stepwise_metrics: # x-axis: step
      - "train/batch_loss"
      - "train/learning_rate"
      - "train/steps_per_sec"
